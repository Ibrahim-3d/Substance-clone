name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: corepack enable
      - run: corepack prepare pnpm@9 --activate

      - run: pnpm install --frozen-lockfile
      - run: pnpm build

      # SPA fallback so deep links resolve, and .nojekyll so Vite's
      # asset folders are served verbatim.
      - run: |
          cp dist/index.html dist/404.html
          touch dist/.nojekyll

      - name: Publish to gh-pages branch
        run: |
          cd dist
          git init -q -b gh-pages
          git config user.name "Ibrahim Elsayed"
          git config user.email "ibrahim_alsaied@outlook.com"
          git add -A
          git commit -q -m "Deploy ${GITHUB_SHA}"
          git push -f "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" gh-pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
